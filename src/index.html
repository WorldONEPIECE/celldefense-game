<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CellDefense — 细胞防御</title>
  <style>
    :root {
      --bg-deep: #07080f; --bg-panel: #0e1020; --bg-panel-light: #151830;
      --bg-card: #1a1f3a; --bg-card-hover: #222845;
      --accent-blue: #4488ff; --accent-cyan: #00ddcc; --accent-purple: #9944ff;
      --accent-green: #00cc88; --accent-red: #ff4455; --accent-orange: #ff8844;
      --text-primary: #dde4ff; --text-secondary: #8890bb; --text-dim: #445577;
      --border: rgba(68,136,255,0.15); --border-bright: rgba(68,136,255,0.4);
      --panel-radius: 10px; --card-radius: 8px;
      --left-panel-w: 220px; --right-panel-w: 220px;
      --top-bar-h: 56px; --hand-area-h: 200px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden;
      font-family: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
      background: var(--bg-deep); color: var(--text-primary); font-size: 13px; }
    #three-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.6; }
    #game-root {
      position: relative; z-index: 1; width: 100%; height: 100%;
      display: grid;
      grid-template-rows: var(--top-bar-h) 1fr var(--hand-area-h);
      grid-template-columns: var(--left-panel-w) 1fr var(--right-panel-w);
      grid-template-areas: "topbar topbar topbar" "left center right" "hand hand hand";
    }
    #top-bar { grid-area: topbar; display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; background: rgba(14,16,32,0.85); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px); }
    #game-title { font-size: 16px; font-weight: 700; letter-spacing: 0.12em; color: var(--accent-cyan);
      text-shadow: 0 0 12px rgba(0,221,204,0.4); }
    #turn-info { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .turn-count { font-size: 14px; font-weight: 600; }
    .turn-phase { font-size: 11px; color: var(--accent-blue); letter-spacing: 0.08em; }
    #btn-end-turn { padding: 8px 22px; background: linear-gradient(135deg,#1a3a7a,#2255cc);
      border: 1px solid var(--accent-blue); border-radius: 6px; color: #fff; font-size: 13px;
      font-weight: 600; cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s;
      box-shadow: 0 0 12px rgba(68,136,255,0.25); }
    #btn-end-turn:hover:not(:disabled) { background: linear-gradient(135deg,#2255aa,#3366ff);
      box-shadow: 0 0 20px rgba(68,136,255,0.5); transform: translateY(-1px); }
    #btn-end-turn:disabled { opacity: 0.4; cursor: not-allowed; }
    #left-panel { grid-area: left; padding: 14px 12px; background: rgba(10,12,26,0.82);
      border-right: 1px solid var(--border); backdrop-filter: blur(6px); overflow-y: auto; }
    .panel-title { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; color: var(--text-secondary);
      text-transform: uppercase; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    #resource-panel { display: flex; flex-direction: column; gap: 9px; }
    .resource-row { display: flex; flex-direction: column; gap: 4px; }
    .resource-label { display: flex; align-items: center; gap: 5px; }
    .resource-icon { font-size: 13px; line-height: 1; }
    .resource-name { font-size: 11px; color: var(--text-secondary); flex: 1; }
    .resource-value { font-size: 12px; font-weight: 700; text-align: right; }
    .resource-max { font-size: 10px; color: var(--text-secondary); font-weight: 400; }
    .resource-bar-wrap { height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
    .resource-bar { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .bar-positive { opacity: 0.85; } .bar-negative { opacity: 0.75; }
    #center-area { grid-area: center; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 20px; }
    #defense-layers { display: flex; flex-direction: column; gap: 5px; width: 100%; max-width: 480px; }
    .defense-layer { display: flex; align-items: center; gap: 10px; padding: 7px 14px;
      background: rgba(14,16,32,0.6); border: 1px solid var(--border); border-radius: 6px; transition: border-color 0.2s; }
    .defense-layer.active { border-color: var(--accent-blue); background: rgba(30,50,100,0.4); }
    .defense-layer.breached { border-color: var(--accent-red); background: rgba(80,10,20,0.4); opacity: 0.7; }
    .layer-num { width: 22px; height: 22px; border-radius: 50%; background: rgba(68,136,255,0.15);
      border: 1px solid var(--accent-blue); display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: var(--accent-blue); flex-shrink: 0; }
    .layer-name { font-size: 11px; color: var(--text-secondary); flex: 1; }
    .layer-status { font-size: 10px; color: var(--text-dim); }
    #right-panel { grid-area: right; padding: 14px 12px; background: rgba(10,12,26,0.82);
      border-left: 1px solid var(--border); backdrop-filter: blur(6px); overflow-y: auto;
      display: flex; flex-direction: column; gap: 14px; }
    #virus-panel { display: flex; flex-direction: column; gap: 8px; }
    .virus-name { font-size: 13px; font-weight: 700; color: var(--accent-purple); }
    .virus-placeholder { font-size: 11px; color: var(--text-secondary); font-style: italic; }
    .virus-load-wrap { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--text-secondary); }
    .virus-load-bar-bg { height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
    .virus-load-bar { height: 100%; background: var(--accent-purple); border-radius: 3px; transition: width 0.3s; }
    #active-pathways { display: flex; flex-direction: column; gap: 5px; }
    .pathway-tag { font-size: 10px; padding: 3px 8px; border-radius: 4px;
      background: rgba(0,220,136,0.12); border: 1px solid rgba(0,220,136,0.3);
      color: var(--accent-green); display: flex; justify-content: space-between; }
    #hand-section { grid-area: hand; background: rgba(7,8,18,0.88); border-top: 1px solid var(--border);
      backdrop-filter: blur(6px); display: flex; flex-direction: column; }
    #hand-bar { height: 28px; padding: 0 20px; display: flex; align-items: center;
      justify-content: space-between; border-bottom: 1px solid var(--border); }
    .hand-label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; color: var(--text-secondary); text-transform: uppercase; }
    .hand-count { font-size: 10px; color: var(--accent-blue); }
    #hand-area { flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 12px; padding: 10px 20px; overflow-x: auto; }
    .card { width: 110px; height: 155px; flex-shrink: 0; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: var(--card-radius); cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .card:hover { transform: translateY(-10px) scale(1.05); border-color: var(--accent-blue);
      box-shadow: 0 8px 30px rgba(68,136,255,0.35); z-index: 10; }
    .card-art { height: 60%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .card-art-label { font-size: 28px; font-weight: 900; opacity: 0.3; color: #fff; }
    .card-body { height: 40%; padding: 5px 7px; display: flex; flex-direction: column; gap: 2px; background: rgba(0,0,0,0.3); }
    .card-name { font-size: 10px; font-weight: 700; line-height: 1.2; }
    .card-cost { font-size: 9px; color: var(--accent-orange); }
    .card-desc { font-size: 9px; color: var(--text-secondary); line-height: 1.3; overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .hand-placeholder { font-size: 12px; color: var(--text-secondary); font-style: italic; opacity: 0.6; }
    #event-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
      align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .event-box { background: var(--bg-panel-light); border: 1px solid var(--accent-orange);
      border-radius: 12px; padding: 28px 32px; max-width: 380px; text-align: center;
      box-shadow: 0 0 40px rgba(255,136,68,0.3); }
    .event-title { font-size: 16px; font-weight: 800; color: var(--accent-orange); margin-bottom: 12px; }
    .event-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 20px; }
    .event-dismiss { padding: 9px 28px; background: rgba(255,136,68,0.15); border: 1px solid var(--accent-orange);
      border-radius: 6px; color: var(--accent-orange); font-size: 13px; cursor: pointer; }
    #gameover-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200;
      align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .gameover-box { text-align: center; padding: 48px 56px; border-radius: 16px; max-width: 440px; }
    .gameover-box.victory { background: rgba(0,80,60,0.6); border: 1px solid var(--accent-green); box-shadow: 0 0 60px rgba(0,204,136,0.3); }
    .gameover-box.defeat  { background: rgba(80,10,20,0.6); border: 1px solid var(--accent-red);   box-shadow: 0 0 60px rgba(255,68,85,0.3); }
    .gameover-box h2 { font-size: 22px; font-weight: 800; margin-bottom: 24px; letter-spacing: 0.06em; }
    .victory h2 { color: var(--accent-green); } .defeat h2 { color: var(--accent-red); }
    .gameover-box button { padding: 12px 36px; border-radius: 8px; font-size: 14px; font-weight: 700;
      cursor: pointer; border: none; background: rgba(255,255,255,0.12); color: var(--text-primary); }
    #loading-screen { position: fixed; inset: 0; background: var(--bg-deep); z-index: 999;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      transition: opacity 0.5s; }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loading-title { font-size: 28px; font-weight: 900; letter-spacing: 0.15em; color: var(--accent-cyan);
      text-shadow: 0 0 20px rgba(0,221,204,0.6); }
    .loading-subtitle { font-size: 13px; color: var(--text-secondary); letter-spacing: 0.1em; }
    .loading-bar-bg { width: 240px; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .loading-bar { height: 100%; background: var(--accent-cyan); border-radius: 2px;
      animation: loadingAnim 1.6s ease-in-out infinite; }
    @keyframes loadingAnim { 0%{width:0%;margin-left:0} 50%{width:70%;margin-left:0} 100%{width:0%;margin-left:100%} }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
    #debug-badge { position: fixed; bottom: 8px; right: 8px; font-size: 9px;
      color: rgba(255,255,255,0.2); z-index: 50; pointer-events: none; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loading-title">CELL DEFENSE</div>
    <div class="loading-subtitle">细胞防御 — 初始化免疫系统</div>
    <div class="loading-bar-bg"><div class="loading-bar"></div></div>
  </div>

  <canvas id="three-canvas"></canvas>

  <div id="game-root">
    <header id="top-bar">
      <div id="game-title">CELL DEFENSE</div>
      <div id="turn-info">
        <span class="turn-count">第 1 回合</span>
        <span class="turn-phase">加载中…</span>
      </div>
      <div id="top-actions">
        <button id="btn-end-turn" disabled>结束回合</button>
      </div>
    </header>

    <aside id="left-panel">
      <div class="panel-title">细胞状态</div>
      <div id="resource-panel"><div style="font-size:11px;color:var(--text-secondary);">加载中…</div></div>
    </aside>

    <main id="center-area">
      <div id="defense-layers">
        <div class="defense-layer" data-layer="0"><div class="layer-num">0</div><div class="layer-name">胞外预警层</div><div class="layer-status">待机</div></div>
        <div class="defense-layer" data-layer="1"><div class="layer-num">1</div><div class="layer-name">细胞膜受体层</div><div class="layer-status">待机</div></div>
        <div class="defense-layer" data-layer="2"><div class="layer-num">2</div><div class="layer-name">内体/溶酶体层</div><div class="layer-status">待机</div></div>
        <div class="defense-layer" data-layer="3"><div class="layer-num">3</div><div class="layer-name">细胞质感应层</div><div class="layer-status">待机</div></div>
        <div class="defense-layer" data-layer="4"><div class="layer-num">4</div><div class="layer-name">细胞器网络层</div><div class="layer-status">待机</div></div>
        <div class="defense-layer" data-layer="5"><div class="layer-num">5</div><div class="layer-name">细胞骨架层</div><div class="layer-status">待机</div></div>
        <div class="defense-layer" data-layer="6"><div class="layer-num">6</div><div class="layer-name">核周/核孔层</div><div class="layer-status">待机</div></div>
        <div class="defense-layer" data-layer="7"><div class="layer-num">7</div><div class="layer-name">细胞核防线</div><div class="layer-status">待机</div></div>
      </div>
    </main>

    <aside id="right-panel">
      <div class="panel-title">入侵者</div>
      <div id="virus-panel"><div class="virus-placeholder">等待病毒入侵…</div></div>
      <div class="panel-title" style="margin-top:8px;">活跃通路</div>
      <div id="active-pathways"><div style="font-size:11px;color:var(--text-secondary);font-style:italic;">无活跃通路</div></div>
    </aside>

    <section id="hand-section">
      <div id="hand-bar">
        <span class="hand-label">手牌</span>
        <span class="hand-count" id="hand-count">0 / 0</span>
      </div>
      <div id="hand-area"></div>
    </section>
  </div>

  <div id="event-overlay">
    <div class="event-box">
      <div class="event-title" id="event-title">事件</div>
      <div class="event-desc" id="event-desc">…</div>
      <button class="event-dismiss" id="event-dismiss">确认</button>
    </div>
  </div>

  <div id="gameover-overlay"></div>
  <div id="debug-badge">Phase 1A · v0.1.0</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r158/three.min.js"></script>
  <script type="module">
    import('/js/main.js').then(() => {
      setTimeout(() => { const s = document.getElementById('loading-screen'); if(s) s.classList.add('hidden'); }, 600);
    }).catch(err => {
      console.error('Boot failed:', err);
      document.getElementById('loading-screen').innerHTML =
        `<div style="color:#ff4455;font-family:monospace;padding:2rem;text-align:center;"><h2>启动失败</h2><pre style="font-size:11px;opacity:0.7;">${err.message}</pre></div>`;
    });
  </script>
</body>
</html>
